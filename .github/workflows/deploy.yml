name: Deploy to Render (Manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for deploying'
        required: false
        default: 'Manual deploy'

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate HTML exists
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html not found!"
            exit 1
          fi
          echo "✅ index.html found. Proceeding with deploy..."

      - name: Trigger Render Deploy Hook
        run: |
          echo "🚀 Deploying to Render..."
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Deploy triggered successfully!"

      - name: Done
        run: echo "🎉 Render is now building and deploying your site."
